<!DOCTYPE html>
<html>
  <body style="font-family: system-ui, -apple-system, Segoe UI, sans-serif; line-height: 1.5; color: #111827;">
    <h2 style="margin-bottom: 0.5rem;">Verify your email</h2>
    <p style="margin: 0 0 1rem 0;">Use this one-time code to finish creating your Aegis AML account for <strong>{{ .Email }}</strong>:</p>
    <p style="font-size: 1.75rem; font-weight: 700; letter-spacing: 0.35em; margin: 1rem 0;">{{ .Token }}</p>
    <p style="margin: 1rem 0 0 0; font-size: 0.875rem; color: #6b7280;">
      Enter the code on the sign-up screen. Do not share it. If you did not request this, you can ignore this message.
    </p>
  </body>
</html>
